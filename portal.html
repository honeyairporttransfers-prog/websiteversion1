<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Portal | Honey Airport Transfers Ltd</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .portal-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 800px;
        }

        .portal-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .portal-header h1 {
            font-weight: 950;
            letter-spacing: -1px;
            margin-top: 20px;
        }

        .login-box {
            max-width: 400px;
            margin: 0 auto;
        }

        .btn-master {
            width: 100%;
            background: var(--dark);
            color: var(--accent);
            border: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: 900;
            cursor: pointer;
            margin-top: 20px;
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #fafafa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>

<body>
    <div class="portal-container">
        <div class="portal-header">
            <img src="assets/logo-xl.png" alt="Logo" style="height: 120px;">
            <h1>MANAGEMENT PORTAL</h1>
            <p>Honey Airport Transfers Ltd | Secure Administration</p>
        </div>

        <div id="portal-login" class="login-box">
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-weight: 800; font-size: 0.8rem; letter-spacing: 1px;">AUTHENTICATED EMAIL</label>
                <div class="luxe-input-wrapper" style="margin-top: 8px;">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="director@honeyairporttransfersltd.com"
                        style="width: 100%; border: none; padding: 12px 12px 12px 40px; border-radius: 8px; background: #f4f4f4;">
                </div>
            </div>
            <div class="form-group" style="margin-bottom: 20px;">
                <label style="font-weight: 800; font-size: 0.8rem; letter-spacing: 1px;">SECURE PASSWORD</label>
                <div class="luxe-input-wrapper" style="margin-top: 8px;">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPass" placeholder="••••••••"
                        style="width: 100%; border: none; padding: 12px 12px 12px 40px; border-radius: 8px; background: #f4f4f4;">
                </div>
            </div>
            <button class="btn-master" onclick="login()">ACCESS RESERVATIONS</button>
        </div>

        <div id="portal-data" style="display: none;">
            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; padding-bottom: 20px; border-bottom: 2px solid #f4f4f4;">
                <div style="display: flex; gap: 10px;">
                    <button onclick="exportData('csv')" class="btn-master"
                        style="width: auto; padding: 10px 20px; background: #2e7d32; font-size: 0.8rem;">EXCEL
                        EXPORT</button>
                    <button onclick="exportData('txt')" class="btn-master"
                        style="width: auto; padding: 10px 20px; background: #333; font-size: 0.8rem;">TEXT
                        EXPORT</button>
                </div>
                <button onclick="location.reload()" class="btn-master"
                    style="width: auto; padding: 10px 20px; background: var(--accent); color: black; font-size: 1rem;">LOGOUT</button>
            </div>
            <div id="bookingList"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
